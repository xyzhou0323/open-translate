<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ND Translate</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <h1 class="title">ND Translate</h1>
      </div>
    </div>

    <!-- Status Display -->
    <div class="status-section">
      <div id="statusIndicator" class="status-indicator">
        <div class="status-dot"></div>
        <span id="statusText">就绪</span>
      </div>
    </div>

    <!-- Language Selection -->
    <div class="language-section">
      <div class="language-row">
        <select id="sourceLanguage" class="language-select">
          <option value="auto">自动检测</option>
          <option value="en">English</option>
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁体中文</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
          <option value="ru">Русский</option>
        </select>
        <span class="lang-arrow">&rarr;</span>
        <select id="targetLanguage" class="language-select">
          <option value="zh-CN">简体中文</option>
          <option value="en">English</option>
          <option value="zh-TW">繁体中文</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
          <option value="ru">Русский</option>
        </select>
      </div>
    </div>

    <!-- Translation Mode -->
    <div class="mode-section">
      <div class="mode-options">
        <label class="radio-option">
          <input type="radio" name="translationMode" value="replace" id="modeReplace">
          <span class="radio-label">自动替换</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="translationMode" value="paragraph-bilingual" id="modeBilingual">
          <span class="radio-label">自动双语</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="translationMode" value="click-to-translate" id="modeClickTranslate">
          <span class="radio-label">手动双语</span>
        </label>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="actions-section">
      <button id="translateBtn" class="primary-btn">
        翻译页面
      </button>

      <button id="restoreBtn" class="secondary-btn" disabled>
        恢复原文
      </button>
    </div>

    <!-- Quick Settings -->
    <div class="quick-settings">
      <label class="checkbox-option">
        <input type="checkbox" id="autoTranslate">
        <span class="checkbox-label">自动翻译新页面</span>
      </label>

      <label class="checkbox-option">
        <input type="checkbox" id="inputFieldListener">
        <span class="checkbox-label">输入框翻译</span>
      </label>

      <label class="checkbox-option" title="字体、Bionic Reading、间距等详细设置请在高级设置中配置">
        <input type="checkbox" id="accessibilityEnabled">
        <span class="checkbox-label">启用阅读辅助</span>
      </label>
    </div>

    <!-- Translation Engine Toggle -->
    <div class="engine-section">
      <span id="freeLabel" class="engine-option active" title="免费翻译由 Google 提供，效果可能不如 LLM API 精准">免费</span>
      <label class="toggle-switch">
        <input type="checkbox" id="useLLM">
        <span class="toggle-slider"></span>
      </label>
      <span id="llmLabel" class="engine-option" title="需先在高级设置中配置 API 密钥">LLM</span>
    </div>

    <!-- Footer -->
    <div class="footer">
      <button id="optionsBtn" class="text-btn">高级设置</button>
      <div class="version">v1.0.0</div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
      <div class="loading-spinner"></div>
      <div class="loading-text">翻译中...</div>
    </div>
  </div>

  <!-- Import shared modules -->
  <script src="../shared/constants.js"></script>
  <script src="../shared/utils.js"></script>
  <script src="../shared/config.js"></script>
  <script src="../shared/errorHandler.js"></script>
  <script src="../shared/stateManager.js"></script>
  <script src="popup.js"></script>
</body>
</html>
