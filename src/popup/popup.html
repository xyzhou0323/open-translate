<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ND Translate</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <h1 class="title">ND Translate</h1>
      </div>
    </div>

    <!-- Status Display -->
    <div class="status-section">
      <div id="statusIndicator" class="status-indicator">
        <div class="status-dot"></div>
        <span id="statusText" data-i18n="popup_ready">__MSG_popup_ready__</span>
      </div>
    </div>

    <!-- Language Selection -->
    <div class="language-section">
      <div class="language-row">
        <select id="sourceLanguage" class="language-select">
          <option value="auto" data-i18n="language_auto">__MSG_language_auto__</option>
          <option value="en">English</option>
          <option value="zh-CN" data-i18n="language_zh_CN">__MSG_language_zh_CN__</option>
          <option value="zh-TW" data-i18n="language_zh_TW">__MSG_language_zh_TW__</option>
          <option value="ja" data-i18n="language_ja">__MSG_language_ja__</option>
          <option value="ko" data-i18n="language_ko">__MSG_language_ko__</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
          <option value="ru">Русский</option>
        </select>
        <span class="lang-arrow">&rarr;</span>
        <select id="targetLanguage" class="language-select">
          <option value="zh-CN" data-i18n="language_zh_CN">__MSG_language_zh_CN__</option>
          <option value="en">English</option>
          <option value="zh-TW" data-i18n="language_zh_TW">__MSG_language_zh_TW__</option>
          <option value="ja" data-i18n="language_ja">__MSG_language_ja__</option>
          <option value="ko" data-i18n="language_ko">__MSG_language_ko__</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
          <option value="ru">Русский</option>
        </select>
      </div>
    </div>

    <!-- Translation Mode -->
    <div class="mode-section">
      <div class="mode-options">
        <label class="radio-option">
          <input type="radio" name="translationMode" value="replace" id="modeReplace">
          <span class="radio-label" data-i18n="popup_mode_replace">__MSG_popup_mode_replace__</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="translationMode" value="paragraph-bilingual" id="modeBilingual">
          <span class="radio-label" data-i18n="popup_mode_bilingual">__MSG_popup_mode_bilingual__</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="translationMode" value="click-to-translate" id="modeClickTranslate">
          <span class="radio-label" data-i18n="popup_mode_click">__MSG_popup_mode_click__</span>
        </label>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="actions-section">
      <button id="translateBtn" class="primary-btn" data-i18n="popup_translate_page">__MSG_popup_translate_page__</button>
      <button id="restoreBtn" class="secondary-btn" disabled data-i18n="popup_restore_original">__MSG_popup_restore_original__</button>
      <button id="restoreAllBtn" class="secondary-btn" style="color:#d32f2f; border-color:#d32f2f;" data-i18n="popup_restore_webpage">__MSG_popup_restore_webpage__</button>
    </div>

    <!-- Quick Settings -->
    <div class="quick-settings">
      <label class="checkbox-option">
        <input type="checkbox" id="autoTranslate">
        <span class="checkbox-label" data-i18n="popup_auto_translate">__MSG_popup_auto_translate__</span>
      </label>
      <label class="checkbox-option">
        <input type="checkbox" id="toolbarVisible">
        <span class="checkbox-label" data-i18n="popup_show_toolbar">__MSG_popup_show_toolbar__</span>
      </label>
    </div>

    <!-- Translation Engine Toggle -->
    <div class="engine-section">
      <span id="freeLabel" class="engine-option active" data-i18n-title="popup_engine_free_tip" data-i18n="popup_engine_free">__MSG_popup_engine_free__</span>
      <label class="toggle-switch">
        <input type="checkbox" id="useLLM">
        <span class="toggle-slider"></span>
      </label>
      <span id="llmLabel" class="engine-option" data-i18n-title="popup_engine_llm_tip" data-i18n="popup_engine_llm">__MSG_popup_engine_llm__</span>
    </div>

    <!-- Footer -->
    <div class="footer">
      <button id="optionsBtn" class="text-btn" data-i18n="popup_advanced_settings">__MSG_popup_advanced_settings__</button>
      <div class="version">v1.1.0</div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
      <div class="loading-spinner"></div>
      <div class="loading-text" data-i18n="popup_translating">__MSG_popup_translating__</div>
    </div>
  </div>

  <script src="../shared/constants.js"></script>
  <script src="../shared/utils.js"></script>
  <script src="../shared/config.js"></script>
  <script src="../shared/errorHandler.js"></script>
  <script src="../shared/stateManager.js"></script>
  <script src="../shared/i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
